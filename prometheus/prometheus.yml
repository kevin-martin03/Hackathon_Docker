---
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: 
        - IP_DOCKER:9090

  - job_name: 'node_exporter'
    scrape_interval: 5s
    static_configs:
      - targets: 
        - IP_DOCKER:9090

rule_files:
  - alertrules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: 
          - IP_DOCKER:9090
