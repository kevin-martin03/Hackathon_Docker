---
version: '3'
services:
  prometheus:
    image: prom/prometheus:v2.50.0  # Pin version for stability
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
volumes:
  prometheus-data:
